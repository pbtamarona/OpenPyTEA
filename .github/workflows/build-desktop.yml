name: Build desktop apps

# Builds the standalone OpenPyTEA desktop app for every platform on each
# push to the standalone-package branch, and publishes the installers to a
# GitHub Release. Pushes to the branch update a rolling "latest" pre-release;
# pushing a version tag (e.g. v0.1.0) cuts a permanent versioned release.

on:
  push:
    branches: [standalone-package]
    tags: ["v*"]
  workflow_dispatch:

# Needed so the release job can create/update releases and move tags.
permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Apple Silicon)
            os: macos-14
            artifact: macos-arm64
            bundles: app,dmg
          - label: Windows (x64)
            os: windows-latest
            artifact: windows-x64
            bundles: nsis,msi
          - label: Linux (x64)
            os: ubuntu-22.04
            artifact: linux-x64
            bundles: deb,appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            file wget curl

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend sidecar (PyInstaller)
        run: python scripts/build_sidecar.py --skip-smoke-test

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app
        working-directory: frontend
        # linuxdeploy (used for the AppImage) is itself an AppImage and needs
        # FUSE to mount, which GitHub runners lack. Extract-and-run instead.
        # Harmless on macOS/Windows.
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}

      - name: Patch macOS bundle (custom UTI + re-sign + rebuild dmg)
        if: runner.os == 'macOS'
        run: python scripts/patch_macos_plist.py

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p dist-artifacts
          cd frontend/src-tauri/target/release/bundle
          find . -type f \
            \( -name '*.dmg' -o -name '*.exe' -o -name '*.msi' \
               -o -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' \) \
            -exec cp {} "$GITHUB_WORKSPACE/dist-artifacts/" \;
          ls -lh "$GITHUB_WORKSPACE/dist-artifacts/"

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: openpytea-${{ matrix.artifact }}
          path: dist-artifacts/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "title=OpenPyTEA ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "title=OpenPyTEA (latest build)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove previous rolling release
        if: steps.meta.outputs.tag == 'latest'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release delete latest --yes --cleanup-tag || true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          notes="Automated build from commit ${GITHUB_SHA:0:7}."
          flags=()
          if [[ "${{ steps.meta.outputs.prerelease }}" == "true" ]]; then
            flags+=(--prerelease)
            notes="$notes  Rolling pre-release — updated on every push to standalone-package."
          fi
          gh release create "${{ steps.meta.outputs.tag }}" artifacts/* \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.meta.outputs.title }}" \
            --notes "$notes" \
            "${flags[@]}"
